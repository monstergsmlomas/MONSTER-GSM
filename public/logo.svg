<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    Monster GSM — Power Button Icon
    Green arc  = #3DFF14  |  Blue stem = #1A5CFF
    Layered strokes: colored outer → black hollow center = "thick outlined" neon look
    Arc center: (100,108)  radius: 66  gap: ≈±27° from top  → endpoints (66,49) & (134,49)
  -->

  <!-- ═══ GREEN ARC ═══ -->
  <!-- outer soft glow -->
  <path d="M 66,49 A 66,66 0 1,1 134,49"
        stroke="#3DFF14" stroke-width="38" stroke-linecap="round" opacity="0.15"/>
  <!-- mid glow -->
  <path d="M 66,49 A 66,66 0 1,1 134,49"
        stroke="#3DFF14" stroke-width="26" stroke-linecap="round" opacity="0.30"/>
  <!-- solid colored border -->
  <path d="M 66,49 A 66,66 0 1,1 134,49"
        stroke="#3DFF14" stroke-width="20" stroke-linecap="round"/>
  <!-- black hollow center -->
  <path d="M 66,49 A 66,66 0 1,1 134,49"
        stroke="#080808" stroke-width="10" stroke-linecap="round"/>

  <!-- ═══ BLUE STEM ═══ -->
  <!-- outer soft glow -->
  <line x1="100" y1="14" x2="100" y2="74"
        stroke="#1A5CFF" stroke-width="38" stroke-linecap="round" opacity="0.15"/>
  <!-- mid glow -->
  <line x1="100" y1="14" x2="100" y2="74"
        stroke="#1A5CFF" stroke-width="26" stroke-linecap="round" opacity="0.30"/>
  <!-- solid colored border -->
  <line x1="100" y1="14" x2="100" y2="74"
        stroke="#1A5CFF" stroke-width="20" stroke-linecap="round"/>
  <!-- black hollow center -->
  <line x1="100" y1="14" x2="100" y2="74"
        stroke="#080808" stroke-width="10" stroke-linecap="round"/>
</svg>
