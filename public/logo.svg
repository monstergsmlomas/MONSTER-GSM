<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!--
    Monster GSM — Power Button
    Transparent background.
    GREEN ARC:  thick outline stroke (green outer + black hollow inner)
                goes from upper-left → DOWN-LEFT → BOTTOM → up to upper-right
    BLUE PILL:  same technique, tall rounded pill pointing UP through the arc gap

    Circle: center (100,115) radius 72
    Gap ±40° from top:
      Left  = (100 - 72·sin40°, 115 - 72·cos40°) = (100-46.3, 115-55.1) = (53.7, 59.9)
      Right = (100 + 46.3,      115 - 55.1)       = (146.3, 59.9)

    Arc: M 53.7,59.9  A 72,72  0  1  0  146.3,59.9
      large-arc=1  sweep=0 (CCW in SVG screen = visually clockwise going down-left → bottom → up-right) ✓

    Pill: (100,18) → (100,108)  stroke-linecap=round gives the rounded pill shape
  -->

  <!-- ── GREEN ARC ── -->
  <!-- outer colored stroke -->
  <path d="M 53.7,59.9 A 72,72 0 1 0 146.3,59.9"
        fill="none"
        stroke="#3DFF14"
        stroke-width="28"
        stroke-linecap="round"/>
  <!-- black hollow center -->
  <path d="M 53.7,59.9 A 72,72 0 1 0 146.3,59.9"
        fill="none"
        stroke="#000000"
        stroke-width="14"
        stroke-linecap="round"/>

  <!-- ── BLUE PILL ── -->
  <!-- outer colored stroke -->
  <line x1="100" y1="18" x2="100" y2="108"
        stroke="#1A5CFF"
        stroke-width="28"
        stroke-linecap="round"/>
  <!-- black hollow center -->
  <line x1="100" y1="18" x2="100" y2="108"
        stroke="#000000"
        stroke-width="14"
        stroke-linecap="round"/>
</svg>
